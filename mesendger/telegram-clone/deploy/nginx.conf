# Конфигурация nginx для мессенджера
# Скопируйте этот файл в /etc/nginx/sites-available/mesendger
# Затем создайте симлинк: sudo ln -s /etc/nginx/sites-available/mesendger /etc/nginx/sites-enabled/
# И перезапустите nginx: sudo systemctl restart nginx

# Редирект HTTP на HTTPS (раскомментируйте после настройки SSL)
# server {
#     listen 80;
#     server_name YOUR_DOMAIN_OR_IP;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # Замените на ваш домен или IP адрес
    server_name YOUR_SERVER_IP_OR_DOMAIN;

    # Увеличение размера загружаемых файлов
    client_max_body_size 50M;

    # Логи
    access_log /var/log/nginx/mesendger-access.log;
    error_log /var/log/nginx/mesendger-error.log;

    # Запрещаем кэширование index.html и корня - ВСЕГДА отдаём свежий
    location = / {
        root /var/www/mesendger/mesendger/telegram-clone/client-react/build;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    location = /index.html {
        root /var/www/mesendger/mesendger/telegram-clone/client-react/build;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Статические файлы React приложения
    location / {
        root /var/www/mesendger/mesendger/telegram-clone/client-react/build;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Кэширование статических ресурсов (НО БЕЗ JS/CSS пока не проверим, что всё работает)
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
        
        # JS и CSS - ВСЕГДА без кэширования для разработки
        location ~* \.(js|css)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header Last-Modified "";
            add_header ETag "";
        }
    }

    # API и WebSocket для бэкенда
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Увеличенные буферы для больших ответов (ERR_CONTENT_LENGTH_MISMATCH)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
        
        # Отключаем буферизацию для больших ответов (или увеличиваем)
        proxy_buffering on;
        proxy_max_temp_file_size 0;
        
        # Таймауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Отключаем gzip для больших JSON ответов (может вызывать проблемы с Content-Length)
        gzip off;
    }

    # WebSocket для Socket.IO
    location /socket.io {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для WebSocket
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Все uploads - проксируем через Express для универсальности
    # Express правильно раздаёт статику из /var/www/mesendger/server/uploads
    location /uploads {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Кэширование для изображений
        expires 30d;
        add_header Cache-Control "public";
    }
}

